# ── Directories ──────────────────────────────────────────────────────────────
raw_dir:           data/raw            # original drone videos (not tracked in git)
stabilized_dir:    data/stabilized     # stabilize output (not tracked in git)
camera_config_dir: data/camera_configs # generated by georeferencing step
results_dir:       results             # figures and velocity data (not tracked in git)

# ── Video input ───────────────────────────────────────────────────────────────
video_extension: MP4   # file extension for raw videos; case-sensitive on Linux

# ── Georeferencing ────────────────────────────────────────────────────────────
# Method: sift  — automatic matching against a reference orthophoto
#         lab   — known physical dimensions, no orthophoto needed
georeference_method: sift

# Settings for georeference_method: sift
# Provide a georeferenced GeoTIFF of the site (e.g. from SfM / aerial survey).
# The orthophoto should be acquired at the same flow conditions and camera
# geometry as the video clips for best SIFT feature matching.
orthophoto: data/orthophoto.tif
georeference:
  # frame_number: null      # override to use a specific frame; default = middle of clip
  max_ortho_pixels: 4000000 # downsample orthophoto to ~this many pixels for SIFT matching

# Settings for georeference_method: lab
# Use when the physical width/height of the field of view is known and no
# orthophoto is available (e.g. lab flume or small field site).
lab:
  width_m:  2.0     # physical width of field of view (m)
  height_m: 1.0     # physical height of field of view (m)
  # corners: data/lab_corners.json  # optional: pixel coords of LL, UL, UR, LR

# ── PIV parameters ────────────────────────────────────────────────────────────
piv:
  engine:      numba   # retained for backward compatibility; OpenPIV is always used
  window_size: 10      # PIV interrogation window size in pixels
  start_frame: 1
  end_frame:           # leave blank to use all frames
  h_a:         0.0     # actual water surface level (m); update per clip if known

  # Quality filters — applied to every PIV cell
  min_s2n:     1.0     # minimum signal-to-noise ratio (OpenPIV peak2mean; low dynamic range)
  min_corr:    0.5     # minimum cross-correlation coefficient (not used with OpenPIV; retained for compatibility)
  min_speed:   0.02    # minimum speed (m/s); excludes true-zero / stationary noise

  # Noisiness mask — primary land/water discriminator
  # CV = speed_std / speed × 100%.  Stationary land → very high CV;
  # coherent flow → bounded CV.  Raise for slow or highly turbulent reaches.
  cv_threshold: 100.0  # max CV (%) to classify a cell as water (default: 100)

  # DSM-based elevation mask (optional; secondary to CV criterion)
  # dsm:               # DSM GeoTIFF path
  # water_elev_m:      # water surface elevation (m); auto-detected from DSM if blank
