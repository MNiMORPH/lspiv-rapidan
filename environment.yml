name: lspiv-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - jupyter
  - ipython
  - cartopy
  - numpy=1          # numba (used by pyorc) requires numpy <2
  - rasterio         # geospatial raster I/O and coordinate transforms
  - pip:
    - stabilo
    - pyopenrivercam  # install from PyPI; for dev use the GitHub clone
    - snakemake
    - -e .            # install this package in editable mode
