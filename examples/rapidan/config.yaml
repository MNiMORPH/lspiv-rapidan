# ── Directories ──────────────────────────────────────────────────────────────
raw_dir:           data/raw            # original drone videos (not tracked in git)
stabilized_dir:    data/stabilized     # stabilize output (not tracked in git)
camera_config_dir: data/camera_configs # generated by georeferencing step
results_dir:       results             # figures and velocity data (not tracked in git)

# ── Video input ───────────────────────────────────────────────────────────────
video_extension: MP4   # file extension for raw videos (case-sensitive on Linux)

# ── Georeferencing ────────────────────────────────────────────────────────────
# Method: sift  — automatic matching against Zach's orthophoto (field use)
#         lab   — known physical dimensions, no orthophoto needed (lab / test use)
georeference_method: sift

# Settings for georeference_method: sift
orthophoto: data/orthophoto.tif   # Zach's SfM GeoTIFF (not tracked in git)
georeference:
  # frame_number: null        # override to use a specific frame; default is middle of clip
  max_ortho_pixels: 4000000   # downsample orthophoto to ~this many pixels for SIFT

# Settings for georeference_method: lab
lab:
  width_m:          2.0       # physical width of field of view (m)
  height_m:         1.0       # physical height of field of view (m)
  # corners:        data/lab_corners.json  # optional: pixel coords of LL,UL,UR,LR
  # Omit width_m/height_m entirely for a placeholder test run (units will be wrong)

# ── PIV parameters ────────────────────────────────────────────────────────────
piv:
  engine:      numba   # retained for backward compatibility; OpenPIV is always used
  window_size: 20      # PIV interrogation window size in pixels (1 px = 0.05 m)
  # overlap:           # window overlap in pixels; default = window_size // 2 = 10
  start_frame: 1
  end_frame:           # leave blank to use all frames
  h_a:         0.0     # actual water surface level (m); update when known
  min_s2n:     1.0     # signal-to-noise threshold (OpenPIV peak2mean; low dynamic range)
  min_corr:    0.5     # retained for compatibility; not used with OpenPIV
  min_speed:   0.02    # minimum speed (m/s); removes true-zero noise cells only
  cv_threshold: 100.0  # max coefficient of variation (%) to classify a cell as water
                       # stationary land → very high CV; coherent flow → low CV
  # dsm:               # optional DSM GeoTIFF (secondary to CV criterion)
  # water_elev_m:      # water surface elevation (m); auto-detected from DSM if blank
